<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>產生 SD Panel 圖示</title></head>
<body style="background:#0d0d0d;color:#e0e0e0;font-family:'Segoe UI',sans-serif;padding:40px;text-align:center">
<canvas id="c" style="display:none"></canvas>
<h2 style="color:#a78bfa">SD Panel 圖示產生器</h2>
<p style="color:#9ca3af">點下方按鈕，會下載兩個 PNG 圖示。<br>下載後把 icon-192.png 和 icon-512.png 放到 VS 資料夾（和 sd-dashboard.html 同層）。</p>
<button onclick="gen()" style="background:#7c3aed;color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:16px">產生並下載圖示</button>
<div id="msg" style="margin-top:20px;color:#34d399;font-size:1.1rem"></div>
<script>
function drawIcon(ctx, size) {
  const r = size * 0.18;
  // rounded rect bg
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = "#1a1a2e";
  ctx.fill();

  // gradient circle
  const cx = size / 2, cy = size * 0.44;
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.33);
  g.addColorStop(0, "#a78bfa");
  g.addColorStop(1, "#4c1d95");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.3, 0, Math.PI * 2);
  ctx.fill();

  // "SD" text
  ctx.fillStyle = "#ffffff";
  ctx.font = `bold ${Math.round(size * 0.25)}px 'Segoe UI', sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("SD", cx, cy);

  // subtitle
  ctx.fillStyle = "#c4b5fd";
  ctx.font = `${Math.round(size * 0.09)}px 'Segoe UI', sans-serif`;
  ctx.fillText("ComfyUI", cx, size * 0.77);
}

function gen() {
  const c = document.getElementById("c");
  [192, 512].forEach(size => {
    c.width = c.height = size;
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, size, size);
    drawIcon(ctx, size);
    const a = document.createElement("a");
    a.href = c.toDataURL("image/png");
    a.download = `icon-${size}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
  document.getElementById("msg").textContent = "✅ 已下載 icon-192.png 和 icon-512.png，放到 VS 資料夾即可關閉此頁。";
}
</script>
</body>
</html>
